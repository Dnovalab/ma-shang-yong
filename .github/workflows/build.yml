name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: "Build for ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install
        working-directory: AI编程助手

      - name: Generate icons
        run: |
          mkdir -p build/icons
          npx -y sharp-cli --input build/icon.svg --output build/icons/icon.png 1024 1024 || true
        working-directory: AI编程助手

      - name: Build
        run: npx electron-builder --${{ matrix.platform }} --config build.config.json
        working-directory: AI编程助手
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: AI编程助手/dist/*
          token: ${{ secrets.GITHUB_TOKEN }}
