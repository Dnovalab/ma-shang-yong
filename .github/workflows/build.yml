name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build:
    name: "Build for ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install && npm install sharp
        working-directory: AI编程助手
      - name: Generate icons
        run: |
          mkdir -p build/icons
          node -e "const sharp=require('sharp'); const svg=require('fs').readFileSync('build/icon.svg','utf8'); sharp(Buffer.from(svg)).resize(1024,1024).png().toFile('build/icons/icon.png').then(()=>console.log('icon generated')).catch(e=>{console.error(e);process.exit(1)})"
        working-directory: AI编程助手
      - name: Build
        run: npx electron-builder --${{ matrix.platform }} --config build.config.json
        working-directory: AI编程助手
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: AI编程助手/dist/*
          if-no-files-found: warn
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: AI编程助手/dist/*
          token: ${{ secrets.GITHUB_TOKEN }}
